datastax-java-driver {
  advanced.connection.pool.local.size = 4
  advanced.connection.pool.remote.size = 0
  advanced.metrics {
      session {
        enabled = [
          connected-nodes,
          cql-requests,
          cql-client-timeouts,
        ]
        cql-requests {
            highest-latency = 3 seconds
        }
      }
      node {
        enabled = [
          pool.open-connections,
          pool.available-streams,
          pool.in-flight,
          errors.request.write-timeouts,
          errors.request.read-timeouts,
          retries.total,
          retries.aborted,
      ]
      cql-messages {
        highest-latency = 3 seconds
      }
      }
      factory {
      	class = MicrometerMetricsFactory
      }
  }
}